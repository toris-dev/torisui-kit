name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest

    steps:
      # Actions are pinned to commit SHAs (not mutable tags) so a
      # re-pointed tag can't inject code into the pipeline.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # pnpm must be installed before setup-node so the pnpm store cache
      # works. The pnpm version is read from packageManager in package.json.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - name: Verify publish contents
        working-directory: packages/ui
        run: |
          npm pack --dry-run --json > /tmp/pack.json
          node -e "
            const files = require('/tmp/pack.json')[0].files.map((f) => f.path);
            const required = ['dist/index.js', 'dist/index.cjs', 'dist/index.d.ts', 'dist/index.d.cts', 'dist/styles.css', 'README.md', 'LICENSE', 'package.json'];
            const missing = required.filter((f) => !files.includes(f));
            if (missing.length) { console.error('Missing from package:', missing); process.exit(1); }
            console.log('Package contents OK:', files.length, 'files');
          "
