# Default release pipeline: npm Trusted Publishing (GitHub Actions OIDC).
# Runs when a GitHub Release is published. Requires the npm package
# @toris-dev/ui to have this repo/workflow registered as a Trusted
# Publisher (environment: npm). No long-lived npm token needed.
#
# NOTE: create the `npm` environment in repo Settings > Environments and
# add required reviewers / deployment branch+tag rules. Referencing a
# nonexistent environment auto-creates it with NO protection rules.
name: Publish Package

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm

    steps:
      # Actions pinned to commit SHAs — this job can mint the npm OIDC
      # token, so a hijacked action tag here means package takeover.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Assert release tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./packages/ui/package.json').version")
          if [ "${GITHUB_REF_NAME}" != "v${PKG_VERSION}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package version v${PKG_VERSION}" >&2
            exit 1
          fi

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - name: Verify publish contents
        working-directory: packages/ui
        run: |
          npm pack --dry-run --json > /tmp/pack.json
          node -e "
            const files = require('/tmp/pack.json')[0].files.map((f) => f.path);
            const required = ['dist/index.js', 'dist/index.cjs', 'dist/index.d.ts', 'dist/index.d.cts', 'dist/styles.css', 'README.md', 'LICENSE', 'package.json'];
            const missing = required.filter((f) => !files.includes(f));
            if (missing.length) { console.error('Missing from package:', missing); process.exit(1); }
            console.log('Package contents OK:', files.length, 'files');
          "

      - name: Publish to npm
        working-directory: packages/ui
        run: npm publish
