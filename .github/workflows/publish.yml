# Default release pipeline: npm Trusted Publishing (GitHub Actions OIDC).
# Runs when a GitHub Release is published. Requires the npm package
# @toris-dev/ui to have this repo/workflow registered as a Trusted Publisher
# (environment: npm). No long-lived npm token needed.
name: Publish Package

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - name: Verify publish contents
        working-directory: packages/ui
        run: npm pack --dry-run

      - name: Publish to npm
        working-directory: packages/ui
        run: npm publish
