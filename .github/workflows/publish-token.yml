# Fallback release pipeline: classic NPM_TOKEN auth.
# Disabled by default (manual trigger only) — use when Trusted Publishing
# is not yet configured. Requires the NPM_TOKEN repository secret.
name: Publish Package With Token

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm with token
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - name: Publish to npm
        working-directory: packages/ui
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
